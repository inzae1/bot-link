<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13201a">
  <meta name="robots" content="noindex,nofollow">
  <title>출석 포인트 게임</title>
  <style>
    :root {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      color: #f5fff8;
      background: #09110d;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px 14px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% -10%, rgba(34, 197, 94, .28), transparent 34rem),
        linear-gradient(180deg, #13201a, #09110d 72%);
    }
    main {
      width: min(100%, 520px);
      padding: 24px;
      border: 1px solid rgba(134, 239, 172, .18);
      border-radius: 22px;
      background: rgba(15, 27, 20, .94);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 27px; }
    p { margin: 0; color: #a7b8ad; line-height: 1.7; white-space: pre-line; }
    .result { margin-top: 18px; color: #86efac; font-size: 18px; font-weight: 900; }
    .auth-code {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: #07130c;
      color: #bbf7d0;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .actions, .targets { display: grid; gap: 10px; margin-top: 18px; }
    button {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: #22c55e;
      color: #052e16;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }
    button.target {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      background: #173321;
      color: #dcffe7;
    }
    button.share { background: #fee500; color: #191919; }
    button:disabled { cursor: wait; opacity: .55; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">처리 중입니다</h1>
    <p id="message">잠시만 기다려주세요.</p>
    <div class="auth-code" id="auth-code" hidden></div>
    <p class="result" id="result"></p>
    <div class="targets" id="targets"></div>
    <div class="actions">
      <button id="lottery" type="button" hidden>복권 뽑기</button>
      <button class="share" id="share" type="button" hidden>카카오톡 공유하기</button>
    </div>
  </main>
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.6/kakao.min.js"></script>
  <script>
    (function() {
      var API_BASE = "https://korean-word-game.inzae-wordgame.workers.dev";
      var KAKAO_JS_KEY = "075a2d137b102e5d4180c2686354cc3b";
      var params = new URLSearchParams(location.search);
      var mode = params.get("mode");
      var actionId = params.get("action_id");
      var actionToken = params.get("action_token");
      var sessionToken = localStorage.getItem("point_action_session_" + actionId) || "";
      var deviceToken = "";
      var authRequestId = "";
      var authTimer = null;
      var title = document.querySelector("#title");
      var message = document.querySelector("#message");
      var authCode = document.querySelector("#auth-code");
      var result = document.querySelector("#result");
      var targets = document.querySelector("#targets");
      var lotteryButton = document.querySelector("#lottery");
      var shareButton = document.querySelector("#share");
      var shareText = "";
      var shareUrl = "https://inzae1.github.io/bot-link/check-point/";

      if (!actionId || !actionToken || (mode !== "lottery" && mode !== "steal")) {
        title.textContent = "잘못된 링크입니다";
        message.textContent = "카톡에서 .ㅊㅅ 카드를 다시 받아주세요.";
        return;
      }

      function apiUrl(path) {
        return API_BASE + "/api/point-actions/" +
          encodeURIComponent(actionId) + "/" + path +
          "?token=" + encodeURIComponent(actionToken);
      }

      function setBusy(busy) {
        lotteryButton.disabled = busy;
        Array.prototype.forEach.call(
          document.querySelectorAll(".target"),
          function(button) { button.disabled = busy; }
        );
      }

      function requestJson(url, options) {
        options = options || {};
        options.headers = options.headers || {};
        if (sessionToken) options.headers["X-POINT-ACTION-SESSION"] = sessionToken;
        if (deviceToken) options.headers["X-POINT-DEVICE-TOKEN"] = deviceToken;
        return fetch(url, options).then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) throw new Error(data.error || "요청 실패");
            return data;
          });
        });
      }

      function makeDeviceToken() {
        var bytes = new Uint8Array(16);
        if (window.crypto && crypto.getRandomValues) {
          crypto.getRandomValues(bytes);
        } else {
          for (var index = 0; index < bytes.length; index += 1) {
            bytes[index] = Math.floor(Math.random() * 256);
          }
        }
        return Array.prototype.map.call(bytes, function(value) {
          return value.toString(16).padStart(2, "0");
        }).join("");
      }

      function getDeviceStorageKey() {
        return currentSession ? "point_action_device_" + currentSession.actorId : "";
      }

      function finish(text) {
        result.textContent = text;
        shareText = text;
        shareButton.hidden = false;
        message.textContent = "결과를 카카오톡으로 공유할 수 있습니다.";
      }

      function runAction(path, body) {
        setBusy(true);
        result.textContent = "결과를 처리하는 중입니다...";
        return requestJson(apiUrl(path), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {})
        }).then(function(data) {
        title.textContent = mode === "lottery" ? "복권 결과" : "훔치기 결과";
          var text = data.message || "완료했습니다.";
        if (typeof data.point === "number") {
            text += "\n현재 포인트: " + data.point + "P";
        }
          if (data.statusUrl) {
            shareUrl = data.statusUrl;
        }
          targets.innerHTML = "";
          lotteryButton.hidden = true;
          finish(text);
      }).catch(function(error) {
        title.textContent = "실행 실패";
        result.textContent = error.message;
          setBusy(false);
      });
      }

      function startAuth() {
        if (authRequestId) return;
        var deviceStorageKey = getDeviceStorageKey();
        if (deviceStorageKey && !deviceToken) {
          deviceToken = localStorage.getItem(deviceStorageKey) || makeDeviceToken();
          localStorage.setItem(deviceStorageKey, deviceToken);
        }
        authCode.hidden = false;
        authCode.textContent = "인증번호 발급 중...";
        requestJson(apiUrl("auth/request"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ deviceToken: deviceToken })
        }).then(function(data) {
          authRequestId = data.requestId;
          authCode.textContent = ".출석등록 " + data.code;
          title.textContent = "소유자 기기 등록 필요";
          message.textContent =
            "이 카드는 " + (currentSession ? currentSession.actorName + "님" : "카드 주인") + "만 사용할 수 있습니다.\n" +
            "처음 한 번만 카톡방에 위 등록 명령을 입력해주세요.";
          result.textContent = "창을 닫아도 등록은 유지됩니다. 등록 후 같은 링크를 다시 열면 바로 사용할 수 있습니다.";
          authTimer = setInterval(checkAuth, 1800);
        }).catch(function(error) {
          title.textContent = "인증 요청 실패";
          result.textContent = error.message;
        });
      }

      function checkAuth() {
        if (!authRequestId) return;
        requestJson(apiUrl("auth/status") + "&request_id=" + encodeURIComponent(authRequestId))
          .then(function(data) {
            if (data.expired) {
              clearInterval(authTimer);
              result.textContent = "인증번호가 만료됐습니다. 새로고침 후 다시 시도해주세요.";
              return;
            }
            if (!data.approved) return;
            clearInterval(authTimer);
            sessionToken = data.sessionToken;
            deviceToken = data.deviceToken || deviceToken;
            localStorage.setItem("point_action_session_" + actionId, sessionToken);
            if (currentSession && deviceToken) {
              localStorage.setItem("point_action_device_" + currentSession.actorId, deviceToken);
            }
            authCode.hidden = true;
            authCode.textContent = "";
            authRequestId = "";
            loadSession();
          }).catch(function(error) {
            result.textContent = error.message;
          });
      }

      var currentSession = null;

      function renderSession(session) {
        currentSession = session;
        var savedDeviceToken = localStorage.getItem("point_action_device_" + session.actorId) || "";
        if (!deviceToken && savedDeviceToken) {
          deviceToken = savedDeviceToken;
          loadSession();
          return;
        }
        if (!session.authorized) {
          targets.innerHTML = "";
          lotteryButton.hidden = true;
          shareButton.hidden = true;
          startAuth();
          return;
        }
        authCode.hidden = true;
        result.textContent = "";
        if (mode === "lottery") {
          title.textContent = "🎰 포인트 복권";
          message.textContent = session.actorName + "님, 3P로 하루 한 번 도전할 수 있습니다.";
          result.textContent = "현재 포인트: " + session.actorPoint + "P";
          lotteryButton.hidden = false;
          lotteryButton.addEventListener("click", function() {
            runAction("lottery", {});
          });
          return;
        }

        title.textContent = "🥷 포인트 훔치기";
        message.textContent = session.actorName + "님이 훔칠 대상을 선택하세요.";
        result.textContent = "성공 확률은 50%이며 하루 한 번 시도할 수 있습니다.";
        var available = session.users.filter(function(user) {
          return user.id !== session.actorId && Number(user.point || 0) > 0;
        });
        if (!available.length) {
          targets.innerHTML = "<p>훔칠 수 있는 대상이 없습니다.</p>";
          return;
        }
        available.forEach(function(user) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "target";
          var name = document.createElement("span");
          name.textContent = user.name;
          var point = document.createElement("strong");
          point.textContent = user.point + "P";
          button.appendChild(name);
          button.appendChild(point);
          button.addEventListener("click", function() {
            runAction("steal", { targetId: user.id });
          });
          targets.appendChild(button);
        });
      }

      shareButton.addEventListener("click", function() {
        if (!shareText) return;
        if (!window.Kakao) {
          result.textContent = shareText + "\n\n카카오 공유 기능을 불러오지 못했습니다.";
          return;
        }
        if (!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY);
        Kakao.Share.sendDefault({
          objectType: "text",
          text: "🎮 출석 포인트 게임 결과\n\n" + shareText,
          link: {
            mobileWebUrl: shareUrl,
            webUrl: shareUrl
          },
          buttonTitle: "포인트 현황 보기"
        });
      });

      function loadSession() {
        requestJson(apiUrl("session"))
          .then(function(data) {
            renderSession(data.session);
          })
          .catch(function(error) {
            title.textContent = "불러오기 실패";
            message.textContent = "";
            result.textContent = error.message;
          });
      }

      loadSession();
    })();
  </script>
</body>
</html>
