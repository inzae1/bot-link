<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#102033">
  <meta name="robots" content="noindex,nofollow">
  <title>KBO 포인트토토</title>
  <style>
    :root { font-family: Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif; color:#eef7ff; background:#07111f; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; padding:18px 12px 32px; background:radial-gradient(circle at 50% -10%,rgba(59,130,246,.28),transparent 34rem),linear-gradient(180deg,#102033,#07111f 72%); }
    main { width:min(100%,720px); margin:0 auto; }
    .card { margin-top:12px; padding:18px; border:1px solid rgba(147,197,253,.2); border-radius:20px; background:rgba(12,25,43,.94); box-shadow:0 18px 48px rgba(0,0,0,.24); }
    h1 { margin:0 0 8px; font-size:28px; }
    h2 { margin:0 0 12px; font-size:18px; }
    p { margin:0; color:#b8c8dc; line-height:1.65; white-space:pre-line; }
    .status { color:#93c5fd; font-weight:900; }
    .code { margin:14px 0; padding:14px; border-radius:16px; background:#061528; color:#bfdbfe; font-size:28px; font-weight:900; letter-spacing:5px; text-align:center; }
    .games { display:grid; gap:12px; }
    .game { padding:14px; border-radius:16px; background:#0b1829; border:1px solid rgba(147,197,253,.13); }
    .match { display:flex; justify-content:space-between; gap:8px; font-weight:900; }
    .sub { margin-top:6px; color:#8da2ba; font-size:13px; }
    .choices { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
    button, input { width:100%; min-height:44px; border:0; border-radius:12px; font-size:15px; }
    button { background:#3b82f6; color:#eff6ff; font-weight:900; cursor:pointer; }
    button.secondary { background:#1e3a5f; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    input { margin-top:10px; padding:0 12px; background:#07111f; border:1px solid rgba(147,197,253,.2); color:#eef7ff; }
    .result { margin-top:12px; padding:13px; border-radius:14px; background:#081827; color:#dbeafe; line-height:1.6; white-space:pre-line; }
    [hidden] { display:none !important; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>⚾ KBO 포인트토토</h1>
      <p id="message">불러오는 중입니다.</p>
      <div id="auth" hidden>
        <p>카톡방에 아래 명령어를 입력하면 이 브라우저에서 베팅할 수 있습니다.</p>
        <div class="code" id="code">------</div>
        <p class="status" id="auth-status">인증 대기 중...</p>
      </div>
    </div>
    <div class="card" id="board" hidden>
      <h2 id="board-title">오늘 경기</h2>
      <p id="point"></p>
      <div class="games" id="games"></div>
    </div>
  </main>
  <script>
    (function() {
      var API_BASE = "https://korean-word-game.inzae-wordgame.workers.dev";
      var params = new URLSearchParams(location.search);
      var totoId = params.get("toto_id");
      var totoToken = params.get("toto_token");
      var sessionToken = localStorage.getItem("kbo_toto_session_" + totoId) || "";
      var authRequestId = "";
      var authTimer = null;
      var message = document.querySelector("#message");
      var auth = document.querySelector("#auth");
      var code = document.querySelector("#code");
      var authStatus = document.querySelector("#auth-status");
      var board = document.querySelector("#board");
      var boardTitle = document.querySelector("#board-title");
      var point = document.querySelector("#point");
      var games = document.querySelector("#games");

      if (!totoId || !totoToken) {
        message.textContent = "잘못된 링크입니다. 카톡에서 .크보토토를 다시 입력해주세요.";
        return;
      }

      function api(path) {
        return API_BASE + "/api/kbo-toto/" + encodeURIComponent(totoId) + "/" + path +
          "?token=" + encodeURIComponent(totoToken);
      }

      function requestJson(url, options) {
        options = options || {};
        options.headers = options.headers || {};
        if (sessionToken) options.headers["X-KBO-TOTO-SESSION"] = sessionToken;
        return fetch(url, options).then(function(response) {
          return response.json().then(function(data) {
            if (!response.ok) throw new Error(data.error || "요청 실패");
            return data;
          });
        });
      }

      function pickLabel(pick, game) {
        if (pick === "원정") return game.away + " 승";
        if (pick === "홈") return game.home + " 승";
        return "무승부";
      }

      function render(session) {
        message.textContent = session.actorName + "님 전용 토토입니다.";
        board.hidden = false;
        boardTitle.textContent = session.title || "오늘 경기";
        point.textContent = "보유 포인트: " + session.actorPoint + "P · 경기당 최대 " + session.maxStake + "P";
        games.innerHTML = "";
        session.games.forEach(function(game) {
          var wrap = document.createElement("div");
          wrap.className = "game";
          var disabled = game.closed || !session.authorized || session.bets[game.key];
          wrap.innerHTML =
            '<div class="match"><span>[' + game.no + '] ' + (game.time || "") + '</span><span>' +
            game.away + ' vs ' + game.home + '</span></div>' +
            '<div class="sub">' + (game.closed ? "마감" : "베팅가능") +
            ' · ' + (game.awayPitcher || "-") + ' vs ' + (game.homePitcher || "-") + '</div>' +
            '<input type="number" min="1" max="' + session.maxStake + '" value="10" ' + (disabled ? "disabled" : "") + '>' +
            '<div class="choices"></div>' +
            '<div class="result" hidden></div>';
          var input = wrap.querySelector("input");
          var choices = wrap.querySelector(".choices");
          var result = wrap.querySelector(".result");
          [["원정", game.away + " x" + Number(game.odds.away).toFixed(2)], ["무", "무 x" + Number(game.odds.draw).toFixed(2)], ["홈", game.home + " x" + Number(game.odds.home).toFixed(2)]].forEach(function(item) {
            var button = document.createElement("button");
            button.type = "button";
            button.className = "secondary";
            button.textContent = item[1];
            button.disabled = disabled;
            button.addEventListener("click", function() {
              var stake = parseInt(input.value, 10);
              if (!stake || stake <= 0) {
                result.hidden = false;
                result.textContent = "베팅 포인트를 입력해주세요.";
                return;
              }
              Array.prototype.forEach.call(wrap.querySelectorAll("button,input"), function(el) { el.disabled = true; });
              result.hidden = false;
              result.textContent = "베팅 접수 중입니다...";
              requestJson(api("bets"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ gameKey: game.key, pick: item[0], stake: stake })
              }).then(function(data) {
                result.textContent = data.message + "\n" + pickLabel(item[0], game) + " · " + stake + "P → 예상 " + data.expectedReturn + "P\n잔여 " + data.point + "P";
                load();
              }).catch(function(error) {
                result.textContent = error.message;
                Array.prototype.forEach.call(wrap.querySelectorAll("button,input"), function(el) { el.disabled = false; });
              });
            });
            choices.appendChild(button);
          });
          if (session.bets[game.key]) {
            result.hidden = false;
            result.textContent = "이미 베팅했습니다: " + pickLabel(session.bets[game.key].pick, game) + " · " + session.bets[game.key].stake + "P";
          }
          games.appendChild(wrap);
        });
      }

      function startAuth() {
        auth.hidden = false;
        requestJson(api("auth/request"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        }).then(function(data) {
          authRequestId = data.requestId;
          code.textContent = ".토토인증 " + data.code;
          authStatus.textContent = "카톡 인증을 기다리는 중입니다.";
          authTimer = setInterval(checkAuth, 1800);
        }).catch(function(error) {
          authStatus.textContent = error.message;
        });
      }

      function checkAuth() {
        if (!authRequestId) return;
        requestJson(api("auth/status") + "&request_id=" + encodeURIComponent(authRequestId))
          .then(function(data) {
            if (data.expired) {
              clearInterval(authTimer);
              authStatus.textContent = "인증번호가 만료됐습니다. 새로고침 후 다시 시도해주세요.";
              return;
            }
            if (!data.approved) return;
            clearInterval(authTimer);
            sessionToken = data.sessionToken;
            localStorage.setItem("kbo_toto_session_" + totoId, sessionToken);
            auth.hidden = true;
            load();
          }).catch(function(error) {
            authStatus.textContent = error.message;
          });
      }

      function load() {
        requestJson(api("session"))
          .then(function(data) {
            render(data.session);
            if (!data.session.authorized && !authRequestId) startAuth();
            if (data.session.authorized) auth.hidden = true;
          })
          .catch(function(error) {
            message.textContent = error.message;
          });
      }

      load();
    })();
  </script>
</body>
</html>
